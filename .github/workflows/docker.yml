name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u benjcrpy --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/benjcrpy/postiz-custom:latest .

      - name: Push image
        run: |
          docker push ghcr.io/benjcrpy/postiz-custom:latest
